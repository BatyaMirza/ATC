<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#07111e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ATC Trainer"/>

<title>ATC Trainer — Диспетчер ОВД</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07111e;--surface:#0b1928;--card:#0e2040;
  --border:#1a3a5c;--borderhi:#2a5a8c;
  --green:#4ade80;--greendim:#1a5c35;--greenbg:rgba(74,222,128,.09);
  --amber:#f59e0b;--amberbg:rgba(245,158,11,.1);
  --red:#ef4444;--redbg:rgba(239,68,68,.09);
  --blue:#38bdf8;
  --text:#dde8f5;--textsec:#6a90b0;--textdim:#2e4f6a;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;}
.mono{font-family:'Courier New',monospace;}

/* RADAR BG */
#radar-bg{position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;opacity:.035;z-index:0;}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;
  background:rgba(7,17,30,.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);display:flex;align-items:center;
  justify-content:space-between;padding:0 10px;gap:6px;}
.h-left{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.h-logo svg{display:block;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0;}
/* Tab nav — отдельная строка под хедером */
#tab-nav-bar{position:fixed;top:44px;left:0;right:0;z-index:99;
  background:rgba(7,17,30,.97);border-bottom:1px solid var(--border);
  display:flex;gap:0;}
.h-nav{display:none;} /* скрываем старый nav в хедере */
.tab-btn{font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;
  font-weight:bold;cursor:pointer;padding:10px 0;border:none;border-bottom:2px solid transparent;
  background:transparent;color:var(--textsec);transition:all .15s;white-space:nowrap;flex:1;text-align:center;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.h-right{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.lang-btn{font-family:'Courier New',monospace;font-size:9px;font-weight:bold;
  cursor:pointer;padding:4px 7px;border:1px solid var(--border);
  background:transparent;color:var(--textdim);}
.lang-btn.active{background:var(--green);color:var(--bg);border-color:var(--green);}
.abort-btn{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;
  font-weight:bold;cursor:pointer;padding:5px 10px;
  background:transparent;color:var(--amber);border:1px solid var(--amber);}

/* MAIN CONTENT */
#app{position:relative;z-index:1;max-width:720px;margin:0 auto;
  padding:100px 14px 32px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;}
.card-hi{border-color:var(--borderhi);border-left:4px solid var(--green);}
.surface{background:var(--surface);border:1px solid var(--border);padding:12px;margin-bottom:10px;}

/* BUTTONS */
.btn-primary{width:100%;padding:15px;font-family:'Courier New',monospace;font-size:12px;
  font-weight:bold;letter-spacing:4px;cursor:pointer;background:var(--green);
  color:var(--bg);border:none;transition:all .2s;}
.btn-primary:disabled{background:var(--textdim);cursor:not-allowed;}
.btn-ghost{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;
  font-weight:bold;cursor:pointer;padding:6px 13px;
  background:transparent;color:var(--green);border:1px solid var(--green);}
.btn-ghost.red{color:var(--red);border-color:var(--red);}
.btn-ghost.blue{color:var(--blue);border-color:var(--blue);}
.btn-ghost.amber{color:var(--amber);border-color:var(--amber);}
.btn-ghost.active{background:var(--green);color:var(--bg);}
.btn-sm{font-family:'Courier New',monospace;font-size:8px;padding:5px 9px;cursor:pointer;
  background:transparent;border:1px solid;font-weight:bold;}

/* FORM */
.label{font-family:'Courier New',monospace;font-size:8px;color:var(--textdim);
  letter-spacing:2px;margin-bottom:4px;display:block;}
input,textarea,select{width:100%;background:var(--bg);color:var(--text);
  border:1px solid var(--border);padding:8px 10px;
  font-family:'Courier New',monospace;font-size:11px;outline:none;
  box-sizing:border-box;}
textarea{resize:vertical;}
select{cursor:pointer;}

/* MODE CARDS */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.mode-card{background:var(--surface);border:2px solid var(--border);
  padding:15px 14px;cursor:pointer;transition:all .15s;}
.mode-card.active{background:var(--greenbg);border-color:var(--green);}

/* SIZE BUTTONS */
.size-grid{display:flex;gap:7px;}
.size-btn{flex:1;padding:11px 0;cursor:pointer;font-family:'Courier New',monospace;
  font-size:15px;font-weight:bold;background:var(--card);
  color:var(--textsec);border:1px solid var(--border);transition:all .15s;}
.size-btn.active{background:var(--green);color:var(--bg);border-color:var(--green);}

/* OPTION BUTTONS */
.opt-btn{width:100%;padding:12px 16px;text-align:left;font-family:'Segoe UI',sans-serif;
  font-size:13px;cursor:pointer;line-height:1.5;transition:all .15s;margin-bottom:7px;
  background:var(--surface);border:1px solid var(--border);
  border-left:1px solid var(--border);color:var(--textsec);}
.opt-btn.correct{background:var(--greenbg);border-color:var(--green);
  border-left-width:3px;color:var(--green);}
.opt-btn.wrong{background:var(--redbg);border-color:var(--red);
  border-left-width:3px;color:var(--red);}
.opt-btn.dimmed{color:var(--textdim);}

/* PROGRESS BAR */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;}
.progress-fill{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--greendim),var(--green));transition:width .4s;}

/* RATIONALE */
.rationale{padding:12px 16px;margin-bottom:12px;font-size:11px;line-height:1.75;
  border-left-width:4px;border-left-style:solid;}
.rationale.ok{background:var(--greenbg);border-color:var(--green);}
.rationale.fail{background:var(--redbg);border-color:var(--red);}

/* RESULT */
.result-wrap{display:flex;align-items:center;justify-content:center;min-height:85vh;}
.result-card{width:100%;max-width:460px;background:var(--card);padding:32px 26px;text-align:center;}
.pct-big{font-family:'Courier New',monospace;font-size:64px;font-weight:900;line-height:1;margin:16px 0 4px;}
.grade-badge{padding:10px 20px;margin-bottom:20px;font-family:'Courier New',monospace;
  font-size:10px;font-weight:bold;letter-spacing:3px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:22px;}
.stat-box{background:var(--surface);border:1px solid var(--border);padding:12px 6px;text-align:center;}
.stat-num{font-family:'Courier New',monospace;font-size:26px;font-weight:bold;}
.stat-lbl{font-size:9px;color:var(--textdim);margin-top:2px;}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);padding:20px;text-align:center;
  cursor:pointer;margin-bottom:8px;background:var(--bg);transition:border-color .15s;}
.drop-zone.dragover{border-color:var(--green);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(7,17,30,.9);
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;}
.modal{background:var(--card);padding:28px 32px;max-width:340px;width:90%;text-align:center;}

/* INFO BANNER */
.banner{padding:7px 12px;border:1px solid;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;font-size:10px;}
.banner.green{background:var(--greenbg);border-color:var(--greendim);color:var(--green);}
.banner.amber{background:var(--amberbg);border-color:var(--amber);color:var(--amber);}

/* GEN SCREEN */
.gen-screen{display:flex;align-items:center;justify-content:center;min-height:85vh;text-align:center;}

/* DOC LIST */
.doc-item{background:var(--card);border:1px solid var(--border);
  padding:12px 14px;margin-bottom:8px;}

/* CORNER MARKERS */
.corner-wrap{position:relative;overflow:hidden;}
.corner{position:absolute;width:14px;height:14px;}
.corner.tl{top:8px;left:8px;border-top:2px solid var(--green);border-left:2px solid var(--green);}
.corner.tr{top:8px;right:8px;border-top:2px solid var(--green);border-right:2px solid var(--green);}
.corner.bl{bottom:8px;left:8px;border-bottom:2px solid var(--green);border-left:2px solid var(--green);}
.corner.br{bottom:8px;right:8px;border-bottom:2px solid var(--green);border-right:2px solid var(--green);}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border)}

/* INSTALL BANNER */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--card);border-top:1px solid var(--green);
  padding:12px 16px;align-items:center;justify-content:space-between;gap:10px;}
#install-banner.show{display:flex;}
</style>

</div>

    <div style="font-size:26px;margin-bottom:8px">⚠</div>

let mammothReady=false, pdfjsReady=false;

async function loadMammoth(){
  if(mammothReady) return;
  await new Promise((ok,err)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    s.onload=ok;s.onerror=err;document.head.appendChild(s);
  });
  mammothReady=true;
}

async function loadPdfJs(){
  if(pdfjsReady) return;
  await new Promise((ok,err)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=ok;s.onerror=err;document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfjsReady=true;
}

async function extractText(file){
  const name=file.name.toLowerCase();
  if(name.endsWith('.txt')||name.endsWith('.md')){
    return new Promise((ok,err)=>{
      const r=new FileReader();r.onload=e=>ok(e.target.result);r.onerror=err;
      r.readAsText(file,'utf-8');
    });
  }
  if(name.endsWith('.docx')||name.endsWith('.doc')){
    await loadMammoth();
    const ab=await file.arrayBuffer();
    const res=await window.mammoth.extractRawText({arrayBuffer:ab});
    return res.value||'';
  }
  if(name.endsWith('.pdf')){
    await loadPdfJs();
    const ab=await file.arrayBuffer();
    const pdf=await window.pdfjsLib.getDocument({data:ab}).promise;
    const pages=[];
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      pages.push(content.items.map(x=>x.str).join(' '));
    }
    return pages.join('\n');
  }
  // fallback
  return new Promise((ok,err)=>{
    const r=new FileReader();r.onload=e=>ok(e.target.result);r.onerror=err;
    r.readAsText(file,'utf-8');
  });
}

async function askClaude(prompt, maxTokens=3000){
  const r=await fetch('https://atc-proxy.batyamirza24.workers.dev',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens,
      messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.map(b=>b.text||'').join('')||'';
}

async function genQuestions(docLabel, docText, count){
  const seed=Date.now()%99999;
  const ln=lang==='ru'?'русском':lang==='en'?'английском':'казахском';
  const raw=await askClaude(
    `Ты — строгий экзаменатор диспетчеров ОВД ГА Казахстана. Сессия #${seed}.
ПРАВИЛО: Составь РОВНО ${count} вопросов на ${ln} языке ТОЛЬКО из текста ниже. НЕ ПРИДУМЫВАЙ данные вне документа.
Источник: «${docLabel}»
Требования:
- Авиационная терминология ИКАО (SSR, QNH, QFE, RVR, FL, LVP, NORDO, go-around, read-back, MAYDAY, SID, CTR, TMA, SIGMET, ATIS, POB, DG...)
- 4 варианта A–D, ровно 1 правильный
- Разнообразие: процедуры, числа, определения, аварии, обязанности
- Правдоподобные дистракторы
- Обоснование со ссылкой на параграф документа
ТЕКСТ:
${docText.slice(0,13000)}
Верни ТОЛЬКО JSON-массив без markdown:
[{"q":"...","opts":["A. ...","B. ...","C. ...","D. ..."],"correct":0,"exp":"...(§X)","ref":"§X"}]`,
    3200
  );
  const m=raw.replace(/```json|```/g,'').trim().match(/\[[\s\S]*\]/);
  if(!m) throw new Error('parse');
  return JSON.parse(m[0]).map(q=>({
    id:uid(),src:docLabel,ref:q.ref||'',
    q:q.q,opts:q.opts,
    correct:typeof q.correct==='number'?q.correct:0,
    exp:q.exp||q.explanation||'',
  }));
}

async function summarizeDoc(docLabel, docText){
  const ln=lang==='ru'?'русском':lang==='en'?'английском':'казахском';
  return askClaude(
    `Авиационный эксперт. Структурированный конспект документа «${docLabel}» на ${ln} языке для диспетчера ОВД. Терминология ИКАО. Разделы с заголовками. Акцент: процедуры, числа, аварии, обязанности. 700–900 слов.\n\nТЕКСТ:\n${docText.slice(0,12000)}`,
    1400
  );
}

// SESSION
// ═══════════════════════════════════════════════════════════════
async function startSession(){
  
  genErr=''; phase='gen'; render(); startSweep();
  try{
    let qs=[];
    if(mode==='all'){
      if(!docs.length){genErr=t().errNoDoc;phase='setup';render();return;}
      const per=Math.max(2,Math.ceil(sessSize/docs.length));
      for(const d of docs){
        try{const r=await genQuestions(d.name,d.text,per);qs.push(...r);}catch{}
      }
    } else {
      const d=docs.find(x=>x.id===selDocId);
      if(!d){genErr=t().errNoDoc;phase='setup';render();return;}
      qs=await genQuestions(d.name,d.text,sessSize);
    }
    if(!qs.length){genErr=t().errNoQs;phase='setup';stopSweep();render();return;}
    queue=shuffle(qs).slice(0,sessSize);
    qi=0;picked=null;hits=0;
    phase='quiz'; stopSweep(); render();
  }catch(e){
    genErr=t().errConn+' ('+e.message+')';
    phase='setup'; stopSweep(); render();
  }
}

function pickAnswer(i){
  if(picked!==null)return;
  picked=i;
  if(i===queue[qi].correct) hits++;
  render();
}

function nextQuestion(){
  if(picked===null)return;
  if(qi+1>=queue.length){phase='result';render();return;}
  qi++;picked=null;render();
}

function newSession(){phase='setup';genErr='';queue=[];qi=0;picked=null;hits=0;render();}

async function genFromDoc(id){

  try{

    setTimeout(()=>{docSt[id]='';render();},3000);

  docGenId=null; render();
}

function startSweep(){
  sweepTimer=setInterval(()=>{
    sweepAngle=(sweepAngle+3)%360;
    const el=document.getElementById('sweep-line');
    const el2=document.getElementById('sweep-trail');
    if(el){
      const rad=(sweepAngle-90)*Math.PI/180;
      el.setAttribute('x2',70+68*Math.cos(rad));
      el.setAttribute('y2',70+68*Math.sin(rad));
    }
    if(el2){
      const rad2=((sweepAngle-35)-90)*Math.PI/180;
      el2.setAttribute('d',`M70 70 L${70+68*Math.cos(rad2)} ${70+68*Math.sin(rad2)}`);
    }
  },30);
}
function stopSweep(){clearInterval(sweepTimer);}

        <line x1="50" y1="8" x2="50" y2="84" stroke="#1a3a5c" stroke-width="1"/>
        <line x1="12" y1="46" x2="88" y2="46" stroke="#1a3a5c" stroke-width="1"/>
        <line x1="50" y1="46" x2="50" y2="8" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
        <path d="M50 46 L76 28" stroke="#4ade80" stroke-width="6" stroke-linecap="round" opacity=".2"/>
        <circle cx="50" cy="46" r="3.5" fill="#4ade80"/>
        <circle cx="72" cy="30" r="3" fill="#4ade80" opacity=".85"/>
        <text x="50" y="96" font-family="monospace" font-size="16" font-weight="bold"
          fill="#4ade80" text-anchor="middle" letter-spacing="3">ATC</text>
      </svg>
      <div>
        <div class="mono" style="font-size:24px;font-weight:900;color:var(--green);letter-spacing:6px;line-height:1">ATC</div>
        <div class="mono" style="font-size:8px;color:var(--textsec);letter-spacing:2px;margin-top:3px">СИСТЕМА ПРОВЕРКИ ЗНАНИЙ</div>
        <div class="mono" style="font-size:7px;color:var(--textdim);margin-top:2px">ДИСПЕТЧЕР ОВД · ICAO</div>
      </div>
    </div>
  </div>

  <div class="mode-grid">
    <div class="mode-card${mode==='all'?' active':''}" onclick="mode='all';render()">
      <div style="font-size:18px;margin-bottom:5px">📋</div>
      <div class="mono" style="font-size:10px;font-weight:bold;color:${mode==='all'?'var(--green)':'var(--text)'};letter-spacing:2px">${T2.modeAll}</div>
      <div style="font-size:9px;color:var(--textdim);margin-top:3px">${T2.modeAllSub}</div>
    </div>
    <div class="mode-card${mode==='doc'?' active':''}" onclick="mode='doc';render()">
      <div style="font-size:18px;margin-bottom:5px">📄</div>
      <div class="mono" style="font-size:10px;font-weight:bold;color:${mode==='doc'?'var(--green)':'var(--text)'};letter-spacing:2px">${T2.modeDoc}</div>
      <div style="font-size:9px;color:var(--textdim);margin-top:3px">${T2.modeDocSub}</div>
    </div>
  </div>

  ${mode==='doc'?`<div class="surface">
    <div class="label">${T2.pickDoc}</div>
    ${docs.length?docList:`<div style="font-size:11px;color:var(--textdim);text-align:center;padding:10px">${T2.docEmpty.split('\n')[0]}</div>`}
  </div>`:''}

  <div class="surface">
    <div class="label" style="margin-bottom:9px">${T2.qCount}</div>
    <div class="size-grid">${sizebtns}</div>
  </div>

  ${genErr?`<div class="banner amber"><span>${esc(genErr)}</span></div>`:''}

  <button class="btn-primary" onclick="startSession()" ${disabled?'disabled':''}>
    ${T2.start}
  </button>
  ${!docs.length?`<div style="font-size:10px;color:var(--textdim);text-align:center;margin-top:8px">↑ Сначала добавьте документы на вкладке «${T2.tab2}»</div>`:''}

  ${docs.length?`<div class="surface" style="margin-top:14px">
    <div class="mono" style="font-size:8px;color:var(--textdim);letter-spacing:2px;margin-bottom:7px">НОРМАТИВНАЯ БАЗА</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      ${docs.map(d=>`<span class="mono" style="font-size:8px;padding:2px 8px;background:var(--card);border:1px solid var(--border);color:var(--textdim)">${esc(d.name)}</span>`).join('')}
    </div>
  </div>`:''}`;
}

// ─── DOCS TAB ─────────────────────────────────────────────────
function renderDocs(T2){
  const docItems=docs.map(doc=>{
    const inBank=bank.filter(q=>q.src===doc.name).length;
    const st=docSt[doc.id]||'';
    const busy=docGenId===doc.id;
    return `<div class="doc-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">${esc(doc.name)}</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <span class="mono" style="font-size:8px;color:var(--textdim)">${doc.text.length.toLocaleString()} симв.</span>
            <span class="mono" style="font-size:8px;color:${inBank>0?'var(--green)':'var(--textdim)'}">
              ${inBank>0?'● '+inBank+' '+T2.docQtyInBank:'○ 0 '+T2.docQtyInBank}
            </span>
            ${st?`<span class="mono" style="font-size:8px;color:${st.startsWith('✓')?'var(--green)':'var(--amber)'}">${esc(st)}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn-sm" style="color:var(--blue);border-color:var(--blue)" onclick="readDoc('${doc.id}')" ${busy?'disabled':''}>
            ${busy&&st===T2.docLoading?T2.docLoading:T2.docRead}
          </button>
          <button class="btn-sm" style="color:var(--green);border-color:var(--green)" onclick="genFromDoc('${doc.id}')" ${busy?'disabled':''}>
            ${busy&&st===T2.docLoading?T2.docLoading:T2.docGen}
          </button>
          <button class="btn-sm" style="color:var(--red);border-color:var(--red)" onclick="delDoc('${doc.id}')">${T2.docDel}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const addForm=showAddForm?`
  <div style="background:var(--card);border:2px solid var(--green);padding:16px;margin-bottom:14px;box-shadow:0 0 20px var(--greenbg)">
    <span class="label">${T2.docNameL}</span>
    <input id="new-name" value="${esc(newName)}" style="margin-bottom:10px" oninput="newName=this.value"/>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-inp').click()">
      <div style="white-space:pre-line;font-family:'Courier New',monospace;font-size:10px;color:var(--textsec)">${T2.docDrop}</div>
      <input type="file" id="file-inp" accept=".txt,.md,.pdf,.doc,.docx" style="display:none" onchange="handleFile(this.files[0])"/>
    </div>
    <div id="upload-status" style="font-size:9px;margin-bottom:8px;min-height:14px"></div>
    <span class="label">${T2.docPaste}</span>
    <textarea id="new-text" rows="4" placeholder="Вставьте текст..." style="margin-bottom:10px" oninput="newText=this.value">${esc(newText)}</textarea>
    <button class="btn-primary" onclick="addDoc()" style="font-size:10px;letter-spacing:3px">${T2.docSave}</button>
  </div>`:''

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span class="mono" style="font-size:11px;color:var(--green);letter-spacing:3px">${T2.docsT}</span>
    <button class="btn-ghost${showAddForm?' active':''}" onclick="toggleAddForm()">
      ${showAddForm?'✕ '+T2.docCancel:T2.docAdd}
    </button>
  </div>

  <div class="banner green">${T2.storageBanner}</div>

  ${addForm}

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <span class="mono" style="font-size:9px;color:var(--textdim)">${T2.docQtyL}</span>
    ${[3,5,10].map(n=>`<button class="btn-sm${docGenQty===n?' active':''}" 
      style="color:${docGenQty===n?'var(--bg)':'var(--green)'};border-color:var(--green);background:${docGenQty===n?'var(--green)':'transparent'}"
      onclick="docGenQty=${n};render()">${n}</button>`).join('')}
  </div>

  ${!docs.length?`<div style="text-align:center;padding:40px 20px;background:var(--surface);border:1px dashed var(--border)">
    <div style="font-size:28px;margin-bottom:10px;opacity:.3">📁</div>
    <div style="font-size:12px;color:var(--textdim);white-space:pre-line">${T2.docEmpty}</div>
  </div>`:`<div>${docItems}</div>`}

  ${docViewer?`<div style="position:fixed;inset:0;z-index:600;background:rgba(7,17,30,.98);overflow-y:auto;padding:16px">
    <div style="max-width:720px;margin:0 auto;background:var(--card);border:1px solid var(--border);padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px">
        <span class="mono" style="font-size:11px;color:var(--green);letter-spacing:2px">${esc(docViewer.name)}</span>
        <button class="btn-ghost red" onclick="docViewer=null;render()">${T2.docViewClose}</button>
      </div>
      <div style="font-size:12px;line-height:1.9;color:var(--text);white-space:pre-wrap">${esc(docViewer.text)}</div>
    </div>
  </div>`:''}`;
}

// ─── BANK TAB ─────────────────────────────────────────────────
function renderBank(T2){
  const allSrcs=[...new Set(bank.map(q=>q.src))];
  const filtered=bankFilter==='all'?bank:bank.filter(q=>q.src===bankFilter);

  const editForm=editQ?`
  <div style="background:var(--card);border:2px solid var(--green);padding:14px;margin-bottom:12px">
    <span class="label">${T2.bankSrc}</span>
    <select id="eq-src" style="margin-bottom:8px">
      ${[...new Set([...allSrcs,...docs.map(d=>d.name)])].map(s=>`<option value="${esc(s)}"${editQ.src===s?' selected':''}>${esc(s)}</option>`).join('')}
    </select>
    <span class="label">${T2.bankRef}</span>
    <input id="eq-ref" value="${esc(editQ.ref)}" style="margin-bottom:8px"/>
    <span class="label">${T2.bankQ}</span>
    <textarea id="eq-q" rows="3" style="margin-bottom:8px">${esc(editQ.q)}</textarea>
    <span class="label">${T2.bankOpts}</span>
    ${editQ.opts.map((o,i)=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
      <input type="radio" name="eq-cor-r" ${editQ.correct===i?'checked':''} onchange="editQ.correct=${i}" style="accent-color:var(--green);cursor:pointer"/>
      <input id="eq-opt-${i}" value="${esc(o)}" style="flex:1;color:${editQ.correct===i?'var(--green)':'var(--text)'};border-color:${editQ.correct===i?'var(--green)':'var(--border)'}"/>
    </div>`).join('')}
    <input type="hidden" id="eq-cor" value="${editQ.correct}"/>
    <span class="label" style="margin-top:8px">${T2.bankExp}</span>
    <textarea id="eq-exp" rows="2" style="margin-bottom:10px">${esc(editQ.exp)}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="saveQ()" style="flex:1;padding:10px;letter-spacing:2px">${T2.bankSave}</button>
      <button class="btn-ghost red" onclick="cancelQ()" style="flex:1">${T2.bankCancel}</button>
    </div>
  </div>`:''

  const qList=filtered.length?filtered.map(q=>`
  <div style="background:var(--card);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px">
    <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
      <div style="flex:1">
        <div class="mono" style="font-size:8px;color:var(--textdim);margin-bottom:3px">${esc(q.src)} ${esc(q.ref||'')}</div>
        <div style="font-size:11px;color:var(--text);line-height:1.5">${esc(q.q)}</div>
        <div class="mono" style="font-size:9px;color:var(--green);margin-top:3px">✓ ${esc(q.opts[q.correct]||'')}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn-sm" style="color:var(--blue);border-color:var(--blue)" onclick="startEditQ('${q.id}')">${T2.bankEdit}</button>
        <button class="btn-sm" style="color:var(--red);border-color:var(--red)" onclick="delQ('${q.id}')">${T2.bankDel}</button>
      </div>
    </div>
  </div>`).join('')
  :`<div style="text-align:center;padding:36px;background:var(--surface);border:1px dashed var(--border)">
    <div style="font-size:12px;color:var(--textdim)">${T2.bankEmpty}</div>
  </div>`;

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span class="mono" style="font-size:11px;color:var(--green);letter-spacing:3px">${T2.bankT} (${bank.length})</span>
    <button class="btn-ghost" onclick="startAddQ()">${T2.bankAdd}</button>
  </div>
  <div style="margin-bottom:12px">
    <select onchange="bankFilter=this.value;render()" style="width:100%">
      <option value="all">${T2.bankAll} (${bank.length})</option>
      ${allSrcs.map(s=>`<option value="${esc(s)}"${bankFilter===s?' selected':''}>${esc(s)} (${bank.filter(q=>q.src===s).length})</option>`).join('')}
    </select>
  </div>
  ${editForm}
  ${qList}`;
}

// ─── QUIZ SCREEN ──────────────────────────────────────────────
function renderQuiz(T2){
  const cur=queue[qi];
  const ans=qi+(picked!==null?1:0);
  const opts=cur.opts.map((o,i)=>{
    let cls='opt-btn';
    if(picked!==null){
      if(i===cur.correct)cls+=' correct';
      else if(i===picked)cls+=' wrong';
      else cls+=' dimmed';
    }
    const mark=picked!==null?(i===cur.correct?'  ✓':i===picked?'  ✗':''):'';
    return `<button class="${cls}" onclick="pickAnswer(${i})">${esc(o)}${mark}</button>`;
  }).join('');

  const rationale=picked!==null?`
  <div class="rationale ${picked===cur.correct?'ok':'fail'}">
    <div class="mono" style="font-size:10px;font-weight:bold;letter-spacing:2px;margin-bottom:4px;color:${picked===cur.correct?'var(--green)':'var(--red)'}">
      ${picked===cur.correct?T2.ok:T2.fail}
    </div>
    <span style="color:var(--textsec);font-weight:600">${T2.rat} </span>
    <span style="color:var(--text);line-height:1.7">${esc(cur.exp)}</span>
  </div>`:'';

  const nextDisabled=picked===null;
  const isLast=qi+1>=queue.length;
  const nextBg=nextDisabled?'var(--textdim)':isLast?'var(--amber)':'var(--green)';

  return `
  <div class="surface" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span class="mono" style="font-size:10px;color:var(--textsec)">${T2.qLabel} ${qi+1} / ${queue.length}</span>
      <div style="display:flex;gap:14px">
        <span class="mono" style="font-size:10px;color:var(--green)">✓ ${hits}</span>
        <span class="mono" style="font-size:10px;color:var(--red)">✗ ${ans-hits}</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(qi/queue.length)*100}%"></div></div>
  </div>

  <div class="mono" style="font-size:8px;color:var(--textdim);margin-bottom:8px;letter-spacing:1px">
    ${T2.ndLabel} ${esc(cur.src)} ${esc(cur.ref||'')}
  </div>

  <div class="card card-hi" style="margin-bottom:12px;padding:18px 20px">
    <div style="font-size:14px;line-height:1.75;color:var(--text);font-weight:500">${esc(cur.q)}</div>
  </div>

  ${opts}
  ${rationale}

  <button class="btn-primary" onclick="${nextDisabled?'':isLast?'phase=\'result\';render()':'nextQuestion()'}"
    ${nextDisabled?'disabled':''}
    style="background:${nextBg};border-color:${nextBg}">
    ${isLast?T2.fin:T2.next}
  </button>`;
}

// ─── RESULT SCREEN ────────────────────────────────────────────
function renderResult(T2){
  const ans=qi+(picked!==null?1:0);
  const pct=ans>0?Math.round(hits/ans*100):0;
  const gc=T2.gradeColor(pct);
  const icon=pct>=90?'🏆':pct>=75?'✅':pct>=60?'⚠️':'📋';

  return `<div class="result-wrap"><div class="result-card" style="border:2px solid ${gc}">
    <div style="font-size:24px;margin-bottom:6px">
      <svg width="60" height="60" viewBox="0 0 100 100" style="display:block;margin:0 auto">
        <rect width="100" height="100" rx="16" fill="#07111e"/>
        <circle cx="50" cy="46" r="38" fill="none" stroke="#1a3a5c" stroke-width="2"/>
        <circle cx="50" cy="46" r="26" fill="none" stroke="#1a3a5c" stroke-width="1.5"/>
        <circle cx="50" cy="46" r="14" fill="none" stroke="#1a3a5c" stroke-width="1"/>
        <line x1="50" y1="8" x2="50" y2="84" stroke="#1a3a5c" stroke-width="1"/>
        <line x1="12" y1="46" x2="88" y2="46" stroke="#1a3a5c" stroke-width="1"/>
        <line x1="50" y1="46" x2="50" y2="8" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
        <circle cx="50" cy="46" r="3.5" fill="#4ade80"/>
        <circle cx="72" cy="30" r="3" fill="#4ade80" opacity=".85"/>
        <text x="50" y="96" font-family="monospace" font-size="16" font-weight="bold"
          fill="#4ade80" text-anchor="middle" letter-spacing="3">ATC</text>
      </svg>
    </div>
    <div class="pct-big" style="color:${gc}">${pct}<span style="font-size:28px">%</span></div>
    <div class="mono" style="font-size:8px;color:var(--textdim);letter-spacing:3px;margin-bottom:20px">${T2.resTitle}</div>
    <div class="grade-badge" style="color:${gc};background:${gc}22;border:1px solid ${gc}">
      [${T2.gcode(pct)}]  ${T2.grade(pct)}
    </div>
    <div class="stats-grid">
      ${[[hits,T2.resC,'var(--green)'],[ans-hits,T2.resE,'var(--red)'],[ans,T2.resT,'var(--blue)']].map(([v,l,c])=>`
      <div class="stat-box">
        <div class="stat-num" style="color:${c}">${v}</div>
        <div class="stat-lbl">${l}</div>
      </div>`).join('')}
    </div>
    <button class="btn-primary" onclick="newSession()">${T2.newSess}</button>
  </div></div>`;
}

// ─── ATTACH LISTENERS ─────────────────────────────────────────
function attachListeners(){
  // drag and drop on drop zone
  const dz=document.getElementById('drop-zone');
  if(dz){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
  }
  // radio buttons for correct answer
  document.querySelectorAll('input[name="eq-cor-r"]').forEach((r,i)=>{
    r.addEventListener('change',()=>{
      if(editQ)editQ.correct=i;
      document.getElementById('eq-cor').value=i;
      document.querySelectorAll('[id^="eq-opt-"]').forEach((inp,j)=>{
        inp.style.color=j===i?'var(--green)':'var(--text)';
        inp.style.borderColor=j===i?'var(--green)':'var(--border)';
      });
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadStorage();
render();

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
